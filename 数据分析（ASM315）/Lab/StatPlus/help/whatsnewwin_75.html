.left-column[
## Analysis
### Improvements
#### v7.5
]
.right-column[
* Seasonal decomposition.
* Partial correlations.
* Added group variable data layout option for hypothesis testing methods and Box-Plot command.
* Mann-Whitney and Wald-Wolfowitz tests provide exact p-values.
* Survival analysis includes Nelson–Aalen estimator.

* Available in insider builds: Engle–Granger and Johansen cointegration tests.
]
---
.left-column[
## Analysis
### Improvements
#### v7.3
]
.right-column[
* Box-Cox Transformation.
* K-Means Clustering (beta version also includes hierarchical clustering).
* Cross-Tabulation, 2x2 and NxK Contingency Tables Analysis commands include additional statistics (weighted Kappa and others), charts and extra options (row/columns ordering, handling non-integer values).
* Exponential Smoothing command includes models with a trend (linear aka Holt, exponential and damped).
* ANOVA report includes p-values for the homogeneity of variances tests and improved means plot.
* Two-sample t-test (paired) includes profiles plot.
* Descriptive Statistics includes a new report layout (`wide`) and an option to sort variables by names or mean values.
* Report improvements for the following commands: Factor Analysis, Principal Component Analysis, Discriminant Function Analysis, Frequency Tables (Categorical), Correlations (Pearson), and Moving Average.

* We are going to continue under-the-hood changes. *Please let us know what features are you missing and get an access to insider builds:*
<!-- and get an access to the Pro version.-->
<br>Use the `Help->Provide Feedback` command or <a href="http://www.analystsoft.com/en/contact/">click here</a>.
]
---
.left-column[
## Analysis
### Improvements
#### v7
]
.right-column[
* Scatter plot command allows to plot ellipses for multiple confidence intervals (simply enter `90, 95, 99` in the options).
* Standartization allows to choose biased estimator of standard deviation.
* Normality tests report includes confidence intervals and Q-Q plots (v6.9 added the Shapiro-Francia test).
* Linear regression report includes two heteroscedasticity tests (more tests are available with separate command - `Heteroscedasticity Tests`) and a Q-Q plot for residuals. Also a new option allows to choose type of residuals to plot.
* Kaplan-Meier report includes Gehan-Breslow-Wilcoxon and Tarone-Ware tests in addition to Logrank test.
* Minor report improvements for Life Tables and Compare ROC Curves commands.
* Scatterplot allows to produce combined plot by groups.
* Unit root test command produces more precise MacKinnon p-values.
]
