##What's New v6.5
#### Applies to: StatPlus:mac
<br/><br/>
Summer is right around the corner and while we are working hard to release brand new version in August, we are glad to release version 6.5 with improvements that should make it easier for you to do your work:
* Support of the latest Excel 2016 builds and Apple Numbers 5.
* Updated data input window: select variables with ease.
* Standalone spreadsheet improvements: charts, printing, localization.
<hr>
<br/><br/>

>Click or press the right-arrow key to discover some new features. Press the left-arrow key or click the right mouse button to return to previous slides.


---
.left-column[
## Data Input
### Improvements:
#### Better input field
#### Select a var with double-click
#### Remove single variable
]
.right-column[
### 
* Select variables from the columns list with double click.
* Now you can't have too many variables &ndash; a field with multiple variables automatically adjusts to fit all selected variables.
* Easily remove single variable/range by clicking on the token arrow &ndash; the same well-known way as in the Mail app.
.row[

]
]

.left-column[
## Spreadsheet
### Improvements:
#### Charts
#### Printing
#### Localization
]
.right-column[
### 
* Charts are rendered correctly for all the commands.<br>New chart types and a chart editor are coming soon.
* Spreadsheet can print all available chart types and images; includes support for different paper sizes and orientation and allows to fit reports to a specific number of pages (wide and tall).
* Localization for built-in spreadsheet engine is finally not just about translation: numbers and dates are correctly recognized according to the system locale.
