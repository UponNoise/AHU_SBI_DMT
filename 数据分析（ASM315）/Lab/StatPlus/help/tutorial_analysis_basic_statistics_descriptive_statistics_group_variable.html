### Group variable
This command is a version of the <a href="tutorial_analysis_basic_statistics_descriptive_statistics.html"><i class="fa fa-youtube-play" aria-hidden="true"></i>`Descriptive Statistics`</a> command that uses different input data layout: observations are in a single column with another column (group variable) indicating which sub-group they belong to. A group variable must have the same number of cases (rows) as the variable with observations.

### When to use
For example, if you have an annual salary survey results with additional information about a respondent - gender and the highest level of education completed, you may be interested to get a summary of the salary differences *between males and females*, and *between respodents with different education level*. 
So to use the `Descriptive Statistics` command for raw data (each row represents a respondent) you are required to *unstack* the `Salary` variable by `Gender` and by `Education`.
With a group variable you can quickly recalculate statistics with a different grouping.
