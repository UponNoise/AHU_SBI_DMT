##Descriptive Statistics
This command displays univariate summary statistics for selected variables.

Simple summaries describe the central tendency (mean, median, and mode), dispersion (range, quartiles, variance and standard deviation) and the distribution shape (skewness and kurtosis) of a variable.
###Options
`Descriptive Statistics` command options allow you to:
* select default percentile calculation method (see the manual),
* plot histogram for each variable,
* change default report layout.

## Single Table
If you have many variables, the report can be very long and ... to compare. So you may find useful to use the single table report mode. A single table report also makes it easier to compare variables side-by-side.

---
.left-column[
  ## Data Input
   Single table
]
.right-column[
- Activate the `Data` worksheet in the <a href="data/Stacked and unstacked data.xlsx"  target="_blank">`Stacked and unstacked data`</a> workbook.

- Run the command:
> ` Statistics&rarr;Basic Statistics&rarr;Descriptive Statistics `
- Select the `High NonOECD &ndash; Upper middle` (`E&ndash;I`) columns as `Variables`.
- Under the `Advanced Options`:
 -  .bg-warning[ Select the `Single Table` value for the `Report` option.]

><img src="images-slides/1001-descriptive-statistics-plot-histogram-advanced-options-histogram-single-table-report-type.png" width="660" height="164" alt="Advanced options for the Descriptive Statistics">

- Click the `OK` button to get the Descriptive Statistics report.

]
---
.left-column[
## Results
 Single table
]
.right-column[
In a single table report columns are variables, rows are statistics.

The first column is frozen, so you can scroll columns to see statistics for all the variables.
